<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Form Fields Automation Testing</title>
    <link rel="icon" type="image/x-icon" href="https://vallarasu.in/logo.png">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Form Fields Automation Testing">
    <meta property="og:url" content="https://vallarasu.in/">
    <meta property="og:description"
        content="Practice automation testing with free realistic website for automation testing. Perfect demo site for Selenium, Cypress, Playwright — featuring carts, checkout, login, dynamic UI & responsive design.">
    <meta property="og:image" content="https://vallarasu.in/assets/images/vallarasu.png">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-K8YR7VFP9F"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-K8YR7VFP9F');
    </script>

    <style type="text/css">
        body {
            background-color: black;
            color: white;
            font-family: monospace;
            font-size: 16px;
            line-height: 1.4;
            overflow-wrap: break-word;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
    </style>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: Segoe UI, sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .form-container {
            border: 1px solid rgb(47, 51, 54);
            background-color: #16181c;
            width: 100%;
            max-width: 560px;
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #fff;
            font-size: 1.55rem;
            font-weight: 700;
        }

        input[type=text],
        input[type=email],
        input[type=tel],
        select {
            width: 100%;
            padding: 12px;
            margin: 0 0 14px;
            font-size: 16px;
            border: 1px solid #d0d0d0;
            background-color: #000000;
            color: lightgray;
            border-radius: 8px;
        }

        .radio-group {
            display: flex;
            gap: 24px;
            margin: 0 0 16px;
            flex-wrap: wrap;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            font-size: 15px;
            cursor: pointer;
        }

        .radio-group input[type=radio] {
            margin-right: 8px;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button[type=submit] {
            background: #eff3f4;
            color: #000;
        }

        button.call {
            background: #eff3f4;
            color: #000;
        }

        a.call-link {
            color: inherit;
            text-decoration: none;
            display: block;
        }

        @media (max-width:520px) {
            .form-container {
                padding: 20px;
            }

            h2 {
                font-size: 1.4rem;
            }

            .radio-group {
                gap: 16px;
                flex-direction: column;
            }

            button {
                font-size: 15px;
                padding: 13px;
            }
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Register your details</h2>

        <form>
            <input id="name-input" data-testid="name-input" type="text" name="name" placeholder="Full Name" required>
            <input id="email-input" data-testid="email-input" type="email" name="email" placeholder="Email Address"
                required>
            <input id="phone-input" data-testid="phone-input" type="tel" name="phone" placeholder="Mobile Number"
                required>
            <input id="location-input" data-testid="location-input" type="text" name="location"
                placeholder="Current Location" required>
            <input id="graduation-input" data-testid="graduation-input" type="text" name="graduation"
                placeholder="Degree / Diploma" required>

            <select id="graduation-select" data-testid="graduation-select" name="year" required>
                <option value="" disabled selected>Year of Graduation</option>
                <option>2026</option>
                <option>2025</option>
                <option>2024</option>
                <option>2023</option>
                <option>Others</option>
            </select>

            <div class="radio-group">
                <label><input id="Online-radio" data-testid="Online-radio" type="radio" name="mode" value="Online"
                        checked> Online</label>
                <label><input id="Offline-radio" data-testid="Offline-radio" type="radio" name="mode" value="Offline">
                    Offline</label>
            </div>

            <input id="tech-input" data-testid="tech-input" type="text" name="tech"
                placeholder="Which technology do you want to learn?" required>

            <div class="buttons">
                <button id="register-button" data-testid="register-button" type="submit">Register Now</button>
                <button id="schedule-button" data-testid="schedule-button" type="button">Schedule a Call</button>
            </div>
        </form>
    </div>

</body>

</html>
